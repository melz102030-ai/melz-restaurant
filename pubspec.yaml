name: melz_restaurant
description: Melz Restaurant - تطبيق مطعم ميلز
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Firebase
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.15.10
  firebase_storage: ^11.7.7

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  fl_chart: ^0.67.0
  shimmer: ^3.0.0

  # Utilities
  url_launcher: ^6.3.0
  http: ^1.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  equatable: ^2.0.5
  timeago: ^3.6.1
  file_picker: ^8.0.3
  excel: ^4.0.6

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
