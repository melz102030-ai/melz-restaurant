name: Build Flutter Web

on:
  push:
    branches: [main]
    paths-ignore:
      - 'build/**'
      - '.github/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --web-renderer canvaskit

      - name: Commit and push build
        run: |
          git config user.email "melz102030@gmail.com"
          git config user.name "melz-bot"
          git add build/web -f
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "build: update web [skip ci]"
          git push
