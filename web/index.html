<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Meals - اطلب أشهى المأكولات">
  <meta name="theme-color" content="#6A0DAD">

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meals">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Open Graph -->
  <meta property="og:title" content="Meals">
  <meta property="og:description" content="اطلب أشهى المأكولات بين يديك">
  <meta property="og:type" content="website">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Meals</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect to speed up external resources -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Fonts preload -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Pacifico&display=swap">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Pacifico&display=swap">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #F8F5FF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ── Floating background particles ─────────────────────────────── */
    .bg-particles {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .bg-particles i {
      position: absolute;
      border-radius: 50%;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(0.6); }
      12%  { opacity: 1; }
      88%  { opacity: 0.5; }
      100% { opacity: 0; transform: translateY(calc(-100vh - 60px)) scale(1); }
    }

    /* ── Loading container ──────────────────────────────────────────── */
    #loading {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #5B4A75;
      width: 100%;
      padding: 0 24px;
    }

    /* Spring pop-in — mirrors Curves.elasticOut from Flutter login screen */
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.45); }
      55%  { opacity: 1; transform: scale(1.07); }
      72%  { transform: scale(0.96); }
      86%  { transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Subtle slide-up for text elements */
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Square banner — logo is 1:1 so no letterboxing */
    .logo-banner {
      width: min(80vw, 300px);
      height: min(80vw, 300px);
      border-radius: 24px;
      background: linear-gradient(135deg, #4A0080, #800040, #8B0000);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 8px 40px rgba(106,13,173,0.32);
      overflow: hidden;
      animation: popIn 0.75s ease-out forwards;
    }

    .logo-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .logo-banner svg {
      width: 80px;
      height: 80px;
      fill: rgba(255,255,255,0.85);
    }

    #loading p {
      color: #5B4A75;
      font-size: 0.95rem;
      margin-bottom: 28px;
      animation: fadeSlide 0.4s ease 0.3s both;
    }

    /* Progress bar */
    .progress-track {
      width: 200px;
      height: 4px;
      background: #EDE7F6;
      border-radius: 4px;
      margin: 0 auto 12px;
      overflow: hidden;
      animation: fadeSlide 0.4s ease 0.35s both;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6A0DAD, #CC1100);
      border-radius: 4px;
      animation: progress 3s ease-in-out forwards;
    }

    @keyframes progress {
      0%   { width: 5%; }
      30%  { width: 40%; }
      60%  { width: 65%; }
      85%  { width: 85%; }
      100% { width: 95%; }
    }

    .loading-text {
      color: #9B8BAD;
      font-size: 0.8rem;
      animation: fadeSlide 0.4s ease 0.4s both, blink 1.5s 0.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* Fade out when Flutter is ready */
    #loading.hide {
      animation: fadeOut 0.4s ease forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: scale(0.95); }
    }
  </style>
</head>
<body>

  <!-- Floating ambient particles -->
  <div class="bg-particles" aria-hidden="true">
    <i style="left:8%;  bottom:-30px; width:28px; height:28px; background:rgba(106,13,173,.18); animation-duration:7.0s; animation-delay:0.0s"></i>
    <i style="left:20%; bottom:-20px; width:16px; height:16px; background:rgba(128,0,64,.15);   animation-duration:10.0s;animation-delay:1.2s"></i>
    <i style="left:35%; bottom:-40px; width:36px; height:36px; background:rgba(204,17,0,.10);   animation-duration:8.5s; animation-delay:2.4s"></i>
    <i style="left:52%; bottom:-25px; width:20px; height:20px; background:rgba(106,13,173,.22); animation-duration:6.5s; animation-delay:0.8s"></i>
    <i style="left:65%; bottom:-35px; width:14px; height:14px; background:rgba(128,0,64,.18);   animation-duration:9.0s; animation-delay:3.1s"></i>
    <i style="left:80%; bottom:-28px; width:30px; height:30px; background:rgba(74,0,128,.15);   animation-duration:7.5s; animation-delay:1.7s"></i>
    <i style="left:12%; bottom:-22px; width:18px; height:18px; background:rgba(204,17,0,.12);   animation-duration:11.0s;animation-delay:4.2s"></i>
    <i style="left:44%; bottom:-32px; width:12px; height:12px; background:rgba(106,13,173,.25); animation-duration:6.0s; animation-delay:2.8s"></i>
    <i style="left:70%; bottom:-44px; width:40px; height:40px; background:rgba(128,0,64,.09);   animation-duration:9.5s; animation-delay:0.4s"></i>
    <i style="left:90%; bottom:-18px; width:16px; height:16px; background:rgba(74,0,128,.20);   animation-duration:8.0s; animation-delay:5.5s"></i>
    <i style="left:28%; bottom:-38px; width:24px; height:24px; background:rgba(106,13,173,.14); animation-duration:12.0s;animation-delay:3.7s"></i>
    <i style="left:58%; bottom:-24px; width:10px; height:10px; background:rgba(204,17,0,.18);   animation-duration:5.5s; animation-delay:1.5s"></i>
  </div>

  <div id="loading">
    <div class="logo-banner" id="logo-banner">
      <!-- Fallback icon until logo loads; replaced instantly on cached visits -->
      <svg id="logo-fallback" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/>
      </svg>
    </div>
    <p>أشهى المأكولات بين يديك</p>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <span class="loading-text">جاري التحميل...</span>
  </div>

  <script>
    (function () {
      var banner = document.getElementById('logo-banner');
      var shownFromCache = false;

      function showLogo(url) {
        var img = document.createElement('img');
        img.alt = 'Meals';
        img.src = url;
        // Insert immediately — browser HTTP cache makes this near-instant on repeat visits
        banner.style.background = 'none';
        banner.innerHTML = '';
        banner.appendChild(img);
        img.onerror = function () {
          // Restore gradient + icon if image fails to load
          banner.style.background = 'linear-gradient(135deg,#4A0080,#800040,#8B0000)';
          banner.innerHTML = '<svg viewBox="0 0 24 24" fill="rgba(255,255,255,.85)" width="80" height="80"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>';
        };
      }

      // Show cached URL immediately (no network needed — logo appears from frame 1)
      var cached = localStorage.getItem('mlz_logo');
      if (cached) {
        shownFromCache = true;
        showLogo(cached);
      }

      // Fetch fresh URL in background and update cache for next visit
      fetch('https://firestore.googleapis.com/v1/projects/melz-restaurant/databases/(default)/documents/settings/restaurant?key=AIzaSyC6DBWYEkTNv7QE0P7MAbtJSlSc6YiJnw0')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var url = data && data.fields && data.fields.logoUrl && data.fields.logoUrl.stringValue;
          if (url) {
            localStorage.setItem('mlz_logo', url);
            // Only update DOM if we didn't already show the cached logo
            if (!shownFromCache) showLogo(url);
          }
        })
        .catch(function () {});
    })();

    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      el.classList.add('hide');
      setTimeout(function () { el.style.display = 'none'; }, 420);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
